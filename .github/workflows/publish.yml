name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without publishing"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - uses: actions/checkout@v6
        with:
          repository: openclaw/clawhub
          ref: main
          path: clawhub-source

      - name: Install ClawHub CLI dependencies
        working-directory: clawhub-source
        run: bun install --frozen-lockfile

      - name: Write ClawHub config
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "clawhub-config.json"
          path.write_text(
              json.dumps({"registry": "https://clawhub.ai", "token": os.environ["CLAWHUB_TOKEN"]}, indent=2),
              encoding="utf-8",
          )
          PY
          echo "CLAWHUB_CONFIG_PATH=$RUNNER_TEMP/clawhub-config.json" >> "$GITHUB_ENV"

      - name: Publish ModelBound skill
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: |
          EXTRA_FLAGS=""
          if [[ "$DRY_RUN" == "true" ]]; then
            EXTRA_FLAGS="--dry-run"
          fi
          bun clawhub-source/packages/clawhub/src/cli.ts \
            --workdir "$GITHUB_WORKSPACE" \
            --site https://clawhub.ai \
            --registry https://clawhub.ai \
            skill publish skills/modelbound \
            --name "ModelBound" \
            --slug modelbound \
            --owner modelbound \
            --source-repo "$SOURCE_REPOSITORY" \
            --source-commit "${{ github.sha }}" \
            --source-path skills/modelbound \
            $EXTRA_FLAGS
